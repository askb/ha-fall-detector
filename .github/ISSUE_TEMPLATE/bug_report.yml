---
name: Bug Report
description: Report a bug with the fall detector add-on or integration
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version
      description: The version of Home Assistant you are running.
      placeholder: "e.g., 2025.1.0"
    validations:
      required: true

  - type: input
    id: addon-version
    attributes:
      label: Add-on / Integration Version
      description: The version of the fall detector add-on or HACS integration.
      placeholder: "e.g., 0.1.0"
    validations:
      required: true

  - type: input
    id: frigate-version
    attributes:
      label: Frigate Version
      description: The version of Frigate NVR you are running.
      placeholder: "e.g., 0.14.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy and paste any relevant log output.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, config snippets, etc).
    validations:
      required: false
